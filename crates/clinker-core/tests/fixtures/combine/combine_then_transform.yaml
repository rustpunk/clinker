# Downstream Transform consumes the combine's output row. Gate: the
# Transform's CXL body must resolve field references against the
# combine's emitted (bare) fields — not against the internal merged
# row's qualified fields.
# C.1.3 gate test `test_combine_downstream_sees_output`.
pipeline:
  name: combine_then_transform
nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
        - { name: amount, type: int }
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
  - type: combine
    name: enriched
    input:
      orders: orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      cxl: |
        emit order_id = orders.order_id;
        emit product_name = products.name;
        emit amount = orders.amount
  - type: transform
    name: upsize
    input: enriched
    config:
      cxl: |
        emit order_id = order_id;
        emit product_name = product_name;
        emit doubled_amount = amount
  - type: output
    name: upsize_out
    input: upsize
    config:
      name: upsize_out
      type: csv
      path: /tmp/combine_then_transform.csv
