# Error fixture (RESOLUTION EC-4): combine input qualifier contains a
# dot. `"a.b"` as qualifier would produce
# `QualifiedField { qualifier: Some("a.b"), name: "c" }` which displays
# as `a.b.c` — ambiguous with a genuine 3-part CXL ref. Reject at
# bind_schema → E301 (reserved/collision).
#
# C.1.1 gate test `test_combine_e301_dotted_qualifier`.
pipeline:
  name: error_dotted_qualifier
nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
  - type: combine
    name: dotted
    input:
      "a.b": orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      cxl: |
        emit order_id = orders.order_id
  - type: output
    name: dotted_out
    input: dotted
    config:
      name: dotted_out
      type: csv
      path: /tmp/error_dotted_qualifier.csv
