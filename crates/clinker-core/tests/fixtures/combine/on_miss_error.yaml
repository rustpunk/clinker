# 2-input combine, on_miss: error — fail the pipeline on first unmatched row.
# Given the input data includes orders with product_id 101 (unmatched), this
# fixture is expected to produce a runtime error in C.2 when executed.
name: on_miss_error
nodes:
  - type: source
    name: orders
    config:
      format: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
        - { name: amount, type: int }
  - type: source
    name: products
    config:
      format: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
        - { name: category, type: string }
  - type: combine
    name: strict
    input:
      orders: orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      match: first
      on_miss: error
      cxl: |
        emit order_id = orders.order_id;
        emit product_id = orders.product_id;
        emit product_name = products.name;
        emit amount = orders.amount;
  - type: output
    name: strict_out
    input: strict
    config:
      format: csv
      path: /tmp/strict_on_miss_error.csv
