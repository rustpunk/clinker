# 2-input combine, match: collect — gathers every matching build record
# for each driver record into one Array-typed field on the output. Per
# Phase Combine R1 (E311), the `cxl:` body MUST be empty under
# `match: collect`; the output row is auto-derived as
# `{ driver fields, <build_qualifier>: Array }`. The executor synthesizes
# the output record at probe time; no body evaluator runs.
pipeline:
  name: match_collect
nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
        - { name: amount, type: int }
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
        - { name: category, type: string }
  - type: combine
    name: collected
    input:
      orders: orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      match: collect
      on_miss: null_fields
      cxl: ""
      propagate_ck: driver
  - type: output
    name: collected_out
    input: collected
    config:
      name: collected_out
      type: csv
      path: /tmp/collected_match_collect.csv
