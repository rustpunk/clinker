# Error fixture: CXL body references a qualified field not in the
# merged row → E308. C.1.3 gate test `test_combine_e308_unknown_merged_field`.
pipeline:
  name: error_body_unknown_field
nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
  - type: combine
    name: bad
    input:
      orders: orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      cxl: |
        emit order_id = orders.order_id
        emit bogus = products.nonexistent_field
  - type: output
    name: bad_out
    input: bad
    config:
      name: bad_out
      type: csv
      path: /tmp/error_body_unknown_field.csv
