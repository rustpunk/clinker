# Error fixture: CXL body has no emit statements → E309. Combine has no
# output fields to publish, which is always an error — unlike Transform
# (W-style no-emit warning), combine has no pass-through semantics.
# C.1.3 gate test `test_combine_e309_no_emit`.
pipeline:
  name: error_no_emit
nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
  - type: combine
    name: bad
    input:
      orders: orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      cxl: ""
      propagate_ck: driver
  - type: output
    name: bad_out
    input: bad
    config:
      name: bad_out
      type: csv
      path: /tmp/error_no_emit.csv
