# NULL handling: some employees have null income. CXL ternary logic
# yields false for null comparisons, so those employees never match
# any bracket. With on_miss: null_fields, unmatched driving rows
# emit with null bracket fields; the IEJoin pre-pass partitions
# null-range driving records out before sorting (Polars approach).
pipeline:
  name: iejoin_null_ranges
nodes:
  - type: source
    name: employees
    config:
      name: employees
      type: csv
      path: tests/fixtures/combine/data/iejoin_null_income.csv
      schema:
        - { name: entity_id, type: string }
        - { name: employee_id, type: string }
        - { name: income, type: int }
  - type: source
    name: brackets
    config:
      name: brackets
      type: csv
      path: tests/fixtures/combine/data/iejoin_brackets.csv
      schema:
        - { name: entity_id, type: string }
        - { name: bracket_id, type: string }
        - { name: bracket_lo, type: int }
        - { name: bracket_hi, type: int }
        - { name: rate, type: float }
  - type: combine
    name: assign_bracket
    input:
      employees: employees
      brackets: brackets
    config:
      where: "employees.entity_id == brackets.entity_id and employees.income >= brackets.bracket_lo and employees.income < brackets.bracket_hi"
      match: first
      on_miss: null_fields
      cxl: |
        emit entity_id = employees.entity_id
        emit employee_id = employees.employee_id
        emit income = employees.income
        emit bracket_id = brackets.bracket_id
        emit rate = brackets.rate
  - type: output
    name: assign_bracket_out
    input: assign_bracket
    config:
      name: assign_bracket_out
      type: csv
      path: /tmp/iejoin_null_ranges.csv
