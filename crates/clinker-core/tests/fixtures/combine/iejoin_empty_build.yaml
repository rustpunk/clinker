# Zero build records. With on_miss: skip every driving row is
# dropped — output is empty. With on_miss: null_fields, the executor
# emits one driving row per input with null bracket fields. This
# fixture pins the on_miss: skip variant; the null_fields case is
# covered by separate runtime tests once the IEJoin executor lands.
pipeline:
  name: iejoin_empty_build
nodes:
  - type: source
    name: employees
    config:
      name: employees
      type: csv
      path: tests/fixtures/combine/data/iejoin_employees.csv
      schema:
        - { name: entity_id, type: string }
        - { name: employee_id, type: string }
        - { name: income, type: int }
  - type: source
    name: brackets
    config:
      name: brackets
      type: csv
      path: tests/fixtures/combine/data/iejoin_brackets_empty.csv
      schema:
        - { name: entity_id, type: string }
        - { name: bracket_id, type: string }
        - { name: bracket_lo, type: int }
        - { name: bracket_hi, type: int }
        - { name: rate, type: float }
  - type: combine
    name: assign_bracket
    input:
      employees: employees
      brackets: brackets
    config:
      where: "employees.entity_id == brackets.entity_id and employees.income >= brackets.bracket_lo and employees.income < brackets.bracket_hi"
      match: first
      on_miss: skip
      cxl: |
        emit entity_id = employees.entity_id
        emit income = employees.income
        emit rate = brackets.rate
      propagate_ck: driver
  - type: output
    name: assign_bracket_out
    input: assign_bracket
    config:
      name: assign_bracket_out
      type: csv
      path: iejoin_empty_build.csv
