# FORWARD-ONLY: baseline captured in Task 16c.2.4
#
# 2 inputs (customers, addresses), 1 output, 2 config params.
# Enriches customer records by joining with address data.
_compose:
  name: customer_enrich
  inputs:
    customers:
      schema:
        - { name: customer_id, type: string }
        - { name: name, type: string }
    addresses:
      schema:
        - { name: customer_id, type: string }
        - { name: street, type: string }
        - { name: city, type: string }
  outputs:
    enriched: enrich_format.out
  config_schema:
    fuzzy_threshold:
      type: float
      default: 0.8
    lookup_table:
      type: string
      required: true

nodes:
  - type: transform
    name: enrich_join
    input: customers
    config:
      cxl: |
        emit match_score = 0.95
  - type: transform
    name: enrich_format
    input: enrich_join
    config:
      cxl: |
        emit enriched_flag = true
