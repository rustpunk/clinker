# FORWARD-ONLY: baseline captured in Task 16c.2.4
#
# 1 input, 1 output, 3 config params. Models DLQ reshaping pattern.
_compose:
  inputs:
    failed_records:
      schema:
        - { name: payload, type: string }
        - { name: error_code, type: string }
  outputs:
    shaped:
      schema:
        - { name: payload, type: string }
        - { name: error_code, type: string }
        - { name: retry_count, type: integer }
        - { name: dlq_topic, type: string }
  config_schema:
    max_retries:
      type: integer
      default: 3
    dlq_topic:
      type: string
    error_category:
      type: string
      default: "unclassified"

nodes:
  - type: transform
    name: add_retry_metadata
    input: failed_records
    config:
      add_fields:
        retry_count: "0"
  - type: transform
    name: stamp_topic
    input: add_retry_metadata
    config:
      add_fields:
        dlq_topic: "default-dlq"
