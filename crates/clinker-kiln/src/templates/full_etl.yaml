_template:
  name: "Full ETL Pipeline"
  description: "Complete extract-transform-load with validation, filtering, and output"
  category: "etl"
  tags: ["csv", "filter", "map", "sort", "etl"]
  author: "clinker"
  version: "1.0"

pipeline:
  name: full-etl
  memory_limit: 2GB

inputs:
  - name: source
    type: csv
    path: "./data/input.csv"
    options:
      has_header: true

transformations:
  - name: validate
    description: "Filter out invalid records"
    cxl: |
      filter id != null
      filter email.contains("@")
  - name: enrich
    description: "Compute derived fields"
    cxl: |
      emit full_name = first_name + " " + last_name
      emit domain = email.split("@").last()
  - name: sort_output
    description: "Sort by last name"
    cxl: |
      sort by last_name asc

outputs:
  - name: result
    type: csv
    path: "./output/result.csv"
    include_header: true

error_handling:
  strategy: continue
  dlq:
    path: "./output/errors.csv"
    include_reason: true
