# 2-input combine, on_miss: skip — inner-join semantics.
# Orders referencing product_id 101 (no match) are dropped.
pipeline:
  name: on_miss_skip
nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: tests/fixtures/combine/data/orders.csv
      schema:
        - { name: order_id, type: string }
        - { name: product_id, type: string }
        - { name: amount, type: int }
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/products.csv
      schema:
        - { name: product_id, type: string }
        - { name: name, type: string }
        - { name: category, type: string }
  - type: combine
    name: matched_only
    input:
      orders: orders
      products: products
    config:
      where: "orders.product_id == products.product_id"
      match: first
      on_miss: skip
      cxl: |
        emit order_id = orders.order_id
        emit product_id = orders.product_id
        emit product_name = products.name
        emit amount = orders.amount
      propagate_ck: driver
  - type: output
    name: matched_only_out
    input: matched_only
    config:
      name: matched_only_out
      type: csv
      path: /tmp/matched_only_on_miss_skip.csv
