# Pure-range fixture: assign each product to a tax bracket using the
# upper bound only (`product.price < bracket.max`). Both inputs declare
# `sort_order:` on the range axis so the planner selects SortMerge over
# IEJoin.
pipeline:
  name: sort_merge_price_range
nodes:
  - type: source
    name: products
    config:
      name: products
      type: csv
      path: tests/fixtures/combine/data/sort_merge_products.csv
      sort_order:
        - field: price
      schema:
        - { name: sku, type: string }
        - { name: price, type: int }
  - type: source
    name: brackets
    config:
      name: brackets
      type: csv
      path: tests/fixtures/combine/data/sort_merge_brackets.csv
      sort_order:
        - field: max
      schema:
        - { name: bracket_id, type: string }
        - { name: max, type: int }
        - { name: rate, type: float }
  - type: combine
    name: assign_bracket
    input:
      products: products
      brackets: brackets
    config:
      where: "products.price < brackets.max"
      match: first
      on_miss: null_fields
      cxl: |
        emit sku = products.sku
        emit price = products.price
        emit bracket_id = brackets.bracket_id
        emit rate = brackets.rate
      propagate_ck: driver
  - type: output
    name: assign_bracket_out
    input: assign_bracket
    config:
      name: assign_bracket_out
      type: csv
      path: sort_merge_price_range.csv
