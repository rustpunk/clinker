# Minimal composition for testing pass-through column behavior and W101 trigger.
_compose:
  name: passthrough_check
  inputs:
    data:
      schema:
        - { name: id, type: string }
  outputs:
    data: add_tag.out
  config_schema: {}

nodes:
  - type: transform
    name: add_tag
    input: data
    config:
      cxl: |
        emit tag = "tagged"
