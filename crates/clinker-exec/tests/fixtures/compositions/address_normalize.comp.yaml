# FORWARD-ONLY: baseline captured in Task 16c.2.4
#
# 1 input, 2 outputs (normalized, rejected), 1 config param.
# Normalizes addresses; routes invalid ones to rejected output.
_compose:
  name: address_normalize
  inputs:
    raw_addresses:
      schema:
        - { name: street, type: string }
        - { name: city, type: string }
        - { name: zip, type: string }
  outputs:
    normalized: clean_whitespace.out
    rejected: validity_check.invalid
  config_schema:
    strict_mode:
      type: bool
      default: false

nodes:
  - type: transform
    name: clean_whitespace
    input: raw_addresses
    config:
      cxl: |
        emit norm_status = "cleaned"
  - type: route
    name: validity_check
    input: clean_whitespace
    config:
      conditions:
        valid: "not is_empty(zip)"
        invalid: "is_empty(zip)"
      default: invalid
