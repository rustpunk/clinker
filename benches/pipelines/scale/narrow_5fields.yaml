pipeline:
  name: bench-narrow-5fields

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: string }
        - { name: f1, type: string }
        - { name: f2, type: string }
        - { name: f3, type: string }
        - { name: f4, type: string }

  - type: transform
    name: compute
    input: source
    config:
      cxl: |
        emit r0 = f0
        emit r1 = f1
        emit r2 = f2
        emit r3 = f3
        emit r4 = f4

  - type: output
    name: sink
    input: compute
    config:
      name: sink
      type: csv
      path: bench://output.csv
      include_unmapped: true
