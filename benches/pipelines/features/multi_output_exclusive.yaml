pipeline:
  name: bench-multi-output-exclusive

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: int }
        - { name: f1, type: string }

  - type: transform
    name: classify
    input: source
    config:
      cxl: |
        emit f0 = f0
        emit f1 = f1

  - type: route
    name: classify_route
    input: classify
    config:
      mode: exclusive
      conditions:
        high: "f0 > 500000"
      default: low

  - type: output
    name: high
    input: classify_route.high
    config:
      name: high
      type: csv
      path: bench://output_high.csv
      include_unmapped: true

  - type: output
    name: low
    input: classify_route.low
    config:
      name: low
      type: csv
      path: bench://output_low.csv
      include_unmapped: true
