pipeline:
  name: bench-streaming-aggregate-presorted

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      sort_order:
        - field: f0
      schema:
        - { name: f0, type: string }
        - { name: f1, type: string }
        - { name: f2, type: string }

  - type: aggregate
    name: agg
    input: source
    config:
      group_by: [f0]
      strategy: streaming
      cxl: |
        emit total = sum(f2.to_int())
        emit n = count(*)

  - type: output
    name: sink
    input: agg
    config:
      name: sink
      type: csv
      path: bench://output.csv
      include_unmapped: true
