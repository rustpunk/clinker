pipeline:
  name: bench-two-pass-window-sum

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: string }
        - { name: f1, type: string }
        - { name: f2, type: string }

  - type: transform
    name: windowed
    input: source
    config:
      cxl: |
        emit total = $window.sum(f2)
      analytic_window:
        group_by: [f0]

  - type: output
    name: sink
    input: windowed
    config:
      name: sink
      type: csv
      path: bench://output.csv
      include_unmapped: true
