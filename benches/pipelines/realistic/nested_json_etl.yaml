pipeline:
  name: bench-nested-json-etl

nodes:
  - type: source
    name: source
    config:
      name: source
      type: json
      path: bench://input.json
      options:
        format: array
        record_path: data.records
      schema:
        - { name: f0, type: int }
        - { name: f1, type: string }
        - { name: f2, type: int }
        - { name: f3, type: string }

  - type: transform
    name: clean
    input: source
    config:
      cxl: |
        emit f0 = f0
        emit f1 = f1
        emit value = f2
        emit label = f1.upper()
        emit code = f3.left(5)

  - type: aggregate
    name: summarize
    input: clean
    config:
      group_by: [f1]
      strategy: hash
      cxl: |
        emit total = sum(value)
        emit n = count(*)

  - type: output
    name: sink
    input: summarize
    config:
      name: sink
      type: csv
      path: bench://output.csv
      include_unmapped: true
