pipeline:
  name: bench-etl-classic

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: int }
        - { name: f1, type: string }
        - { name: f2, type: int }
        - { name: f3, type: string }

  - type: transform
    name: clean
    input: source
    config:
      cxl: |
        emit f0 = f0
        emit f1 = f1
        emit amount = f2
        emit label = f1.upper().trim()
        emit derived = f2 * 2 + f0

  - type: aggregate
    name: summarize
    input: clean
    config:
      group_by: [f1]
      strategy: hash
      cxl: |
        emit total_amount = sum(amount)
        emit avg_amount = avg(amount)
        emit record_count = count(*)
        emit max_derived = max(derived)

  - type: output
    name: sink
    input: summarize
    config:
      name: sink
      type: csv
      path: bench://output.csv
      include_unmapped: true
