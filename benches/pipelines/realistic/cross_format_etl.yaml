pipeline:
  name: bench-cross-format-etl

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: int }
        - { name: f1, type: string }
        - { name: f2, type: int }

  - type: transform
    name: derive
    input: source
    config:
      cxl: |
        emit f0 = f0
        emit f1 = f1
        emit value = f2
        emit description = f1.upper()

  - type: aggregate
    name: summarize
    input: derive
    config:
      group_by: [f1]
      strategy: hash
      cxl: |
        emit total = sum(value)
        emit count = count(*)

  - type: output
    name: sink
    input: summarize
    config:
      name: sink
      type: json
      path: bench://output.json
      include_unmapped: true
