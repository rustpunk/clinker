pipeline:
  name: bench-lookup-enrichment

nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: bench://input.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: int }
        - { name: f1, type: string }
        - { name: f2, type: int }
        - { name: f3, type: string }

  - type: source
    name: products
    config:
      name: products
      type: csv
      path: bench://products.csv
      options:
        has_header: true
      schema:
        - { name: f0, type: string }
        - { name: f1, type: string }

  - type: combine
    name: enrich
    input:
      orders: orders
      products: products
    config:
      where: "orders.f1 == products.f0"
      on_miss: null_fields
      cxl: |
        emit order_id = orders.f0
        emit product_code = orders.f1
        emit quantity = orders.f2
        emit product_name = products.f1 ?? "UNKNOWN"
        emit priority = orders.f3

  - type: route
    name: priority_split
    input: enrich
    config:
      mode: exclusive
      conditions:
        high_priority: "not product_name.is_null() and product_name != \"UNKNOWN\""
      default: standard

  - type: output
    name: high_priority_out
    input: priority_split.high_priority
    config:
      name: high_priority_out
      type: csv
      path: bench://output_high.csv
      include_unmapped: true

  - type: output
    name: standard_out
    input: priority_split.standard
    config:
      name: standard_out
      type: csv
      path: bench://output_standard.csv
      include_unmapped: true
