pipeline:
  name: order_fulfillment
  vars:
    express_surcharge: 5.99
    high_value_threshold: 500

inputs:
  - name: orders
    type: csv
    path: ./data/orders.csv
    options:
      has_header: true
  - name: products
    type: csv
    path: ./data/products.csv
    options:
      has_header: true

outputs:
  - name: fulfilled_orders
    type: csv
    path: ./output/fulfilled_orders.csv
    include_unmapped: false
  - name: priority_report
    type: json
    path: ./output/priority_report.json

transformations:
  - name: normalize_fields
    description: Clean and normalize order fields
    cxl: |
      emit order_ref = "ORD-" + order_id.to_string().pad_left(8, "0")
      emit order_date_parsed = order_date.to_date("yyyy-MM-dd")
      emit line_total = quantity * unit_price

  - name: product_lookup
    description: Enrich orders with product catalog details
    local_window:
      source: products
      "on": product_code
      group_by: product_code
    cxl: |
      emit product_name = window.first().product_name
      emit category = window.first().category
      emit weight_kg = window.first().weight_kg

  - _import: compositions/shipping_cost.comp.yaml

  - _import: compositions/order_classification.comp.yaml

  - name: route_priority
    description: Filter priority report to high-value or express orders
    cxl: |
      emit _route = if priority_level == "urgent" or priority_level == "high" then "priority_report" else "fulfilled_orders"

error_handling:
  strategy: continue
  dlq:
    path: ./output/errors.csv
    include_reason: true
