# Shareable external source schema (unified `SourceSchema` form): a bare
# sequence of `{ name, type, ... }` columns. A source references it with
# `schema: orders.schema.yaml`; the compiler folds the resolved content into
# the pipeline identity hash. The retract-demo `pipeline.yaml` inlines an
# identical schema, so this file also serves as the shareable equivalent.
#
# Order events: department, day, amount, and a free-text quality_score. The
# quality_score column carries a "BAD" sentinel that the demo's validation
# transform rejects (`to_int` fails), producing the failing row the relaxed-CK
# retraction machinery retracts from the aggregate's contributions.
- { name: order_id, type: string }       # frozen identity; stamped $ck.order_id at ingest
- { name: customer_id, type: string }
- { name: department, type: string }     # group-by axis for the downstream aggregate
- { name: day, type: string }            # sort axis for the downstream analytic window
- { name: amount, type: int }
- { name: quality_score, type: string }  # numeric-as-string; the "BAD" sentinel fails to_int()
