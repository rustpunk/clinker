# Shareable external source schema (unified `SourceSchema` form): a bare
# sequence of `{ name, type, ... }` columns. A source references it with
# `schema: audit_events.schema.yaml`. The retract-demo `pipeline.yaml` inlines
# an identical schema, so this file also serves as the shareable equivalent.
#
# Per-order audit trail. Joins to `orders` on `order_id`. Carries an
# independent `event_id` field — under a multi-CK pipeline it would appear
# alongside `order_id` in the propagated correlation set, but today's demo runs
# with a single-field correlation key.
- { name: event_id, type: string }
- { name: order_id, type: string }    # foreign key into orders.order_id; the CK join axis
- { name: actor, type: string }
- { name: event_type, type: string }
