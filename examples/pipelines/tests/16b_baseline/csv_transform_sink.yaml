pipeline:
  name: csv_transform_sink

inputs:
  - name: employees
    type: csv
    path: ./data/employees.csv
    options:
      has_header: true

outputs:
  - name: results
    type: csv
    path: ./output/csv_transform_sink.csv

transformations:
  - name: tier_flag
    cxl: |
      emit id = id
      emit name = name
      emit salary = salary
      emit tier = if salary.to_int() >= 90000 then "senior" else "junior"
