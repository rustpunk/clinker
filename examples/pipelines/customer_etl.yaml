pipeline:
  name: customer_etl

inputs:
  - name: customers
    type: csv
    path: ./data/customers.csv
    options:
      has_header: true
    _notes:
      fields:
        path: Updated quarterly when the CRM team changes export locations.
      stage: Source data from the CRM export.

outputs:
  - name: results
    type: csv
    path: ./output/customers.csv
    include_unmapped: true

transformations:
  - name: active_only
    description: Flag active customers (filter statement added in Phase 12)
    cxl: |
      emit is_active = status == "active"
    _notes:
      fields:
        cxl: The status field uses lowercase string values.
      stage: |
        Active-only filtering was added in Q3 2025 to exclude
        churned accounts from the marketing dataset.

  - _import: compositions/clean_names.comp.yaml

  - _import: compositions/validate_email.comp.yaml
    overrides:
      check_email_format:
        cxl: |
          emit email_valid = email_lower.matches("^[^@]+@(acme|globex)\\.com$")

  - name: final_flag
    description: Flag high-value customers
    cxl: |
      emit tier = if lifetime_value.to_int() > 10000 then "gold" else "standard"

error_handling:
  strategy: fail_fast

_notes:
  pipeline: |
    Customer ETL pipeline for the marketing analytics team.
    Runs nightly via cron. Output feeds the Looker dashboard.
