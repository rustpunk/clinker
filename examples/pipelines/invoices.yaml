pipeline:
  name: invoice_rollup

nodes:
  - type: source
    name: invoices
    config:
      name: invoices
      type: csv
      path: ./data/invoices.csv
      options:
        has_header: true
      schema:
        - { name: invoice_id, type: string }
        - { name: invoice_date, type: string }
        - { name: customer_id, type: string }
        - { name: amount, type: float }

  - type: source
    name: customers
    config:
      name: customers
      type: csv
      path: ./data/customers.csv
      options:
        has_header: true
      schema:
        - { name: customer_id, type: string }
        - { name: first_name, type: string }
        - { name: last_name, type: string }

  - type: transform
    name: recent_only
    description: Filter to last 90 days
    input: invoices
    config:
      cxl: |
        emit _include = now.diff_days(invoice_date.to_date()) < 90

  - type: aggregate
    name: totals
    description: Sum by customer
    input: recent_only
    config:
      group_by: [customer_id]
      cxl: |
        emit customer_id = customer_id
        emit total_amount = sum(amount)
        emit invoice_count = count(*)

  - type: output
    name: rollup
    input: totals
    config:
      name: rollup
      type: csv
      path: ./output/invoice_rollup.csv
      include_unmapped: false

error_handling:
  strategy: continue
