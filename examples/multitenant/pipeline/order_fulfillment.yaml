# Base order-fulfillment pipeline (the pipeline-default layer).
#
# It reads orders, canonicalizes the fields, adds a flat handling fee, scores
# each order through the `risk` composition, and writes the result. Tenants
# customize it via group and channel overlays without editing this file:
#
#   - the `enterprise` group splices a `fraud_check` screening composition in
#     after `normalize` and raises `risk.threshold`;
#   - the `globex` channel locks `risk.threshold` channel-wide with `fixed:`
#     and re-shapes the `amount` source column via a `patch_schema` op;
#   - the `initech` channel bypasses `normalize` (its feed is already
#     canonical), so its output keeps the raw lowercase order ids.
#
# `risk.threshold` is the per-tenant knob the overlays clobber (the `risk`
# composition folds it into its CXL as `$config.threshold`); `normalize` is
# the stable splice anchor the group's `add` op targets and the node initech's
# `bypass` op removes.

pipeline:
  name: order_fulfillment

nodes:
  - type: source
    name: orders
    config:
      name: orders
      type: csv
      path: orders.csv
      options:
        has_header: true
      schema:
        - { name: order_id, type: string }
        - { name: amount, type: float }

  - type: transform
    name: normalize
    description: Canonicalize order ids (trim + uppercase)
    input: orders
    config:
      cxl: |
        emit order_id = order_id.trim().upper()
        emit amount = amount

  - type: transform
    name: handling_fee
    description: Add the flat per-order handling fee
    input: normalize
    config:
      cxl: |
        emit amount = amount + 25.0

  - type: composition
    name: risk
    description: Score each order for value/risk
    input: handling_fee
    use: ../composition/risk_score.comp.yaml
    inputs:
      inp: handling_fee
    config:
      threshold: 0.5

  - type: output
    name: out
    input: risk
    config:
      name: out
      type: csv
      path: output/fulfilled.csv
