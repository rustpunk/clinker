# Per-target overlay: globex's customization of the order_fulfillment pipeline.
# This is the highest-precedence layer, so its values win the 4-layer clobber
# (pipeline-default < group < channel-wide < channel-per-target).
#
#   - `channel.target:` is authoritative; the `.channel.yaml` filename suffix is
#     optional documentation.
#   - `config:` raises `risk.threshold` to 0.95 (over the channel-wide 0.9).
#
# globex is labelled `tier: enterprise` (see channel.cfg.yaml), so the
# `enterprise` group's selector matches and its `fraud_check` screen is spliced
# in automatically. That injection is the overlay effect visible in a
# `run --channel globex`: order ord-1004 (amount 2100) is held for review and
# written as 0, where the base pipeline writes it unchanged.

channel:
  target: ../../pipeline/order_fulfillment.yaml

config:
  risk.threshold: 0.95
