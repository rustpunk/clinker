# Per-target overlay: globex's customization of the order_fulfillment pipeline.
# This is the highest-precedence layer in the 4-layer clobber
# (pipeline-default < group < channel-wide < channel-per-target) — but a
# lower layer can still pin a value against it with `fixed:`.
#
#   - `channel.target:` is authoritative; the `.channel.yaml` filename suffix is
#     optional documentation.
#   - `config:` asks for `risk.threshold: 0.95`, and loses: the channel-wide
#     manifest locked the key at 0.9 with `fixed:`, so the resolved value stays
#     0.9 (`channels resolve` shows it as `[ChannelWide] (fixed)`). The lock is
#     visible in the output too: order ord-1006 (1850 + 25 fee = 1875) clears
#     the 0.9 * 2000 = 1800 cut and is written `high_value = true`; had the
#     0.95 (cut 1900) won, it would not.
#   - `overrides:` re-shapes the `amount` source column with a `patch_schema`
#     op (a `modify` leaf sets a subset of the column's attributes, keeping
#     the rest). Trace which layer set it with
#     `explain --field orders.amount.scale --channel globex`.
#
# globex is labelled `tier: enterprise` (see channel.cfg.yaml), so the
# `enterprise` group's selector matches and its `fraud_check` screen is spliced
# in automatically: order ord-1004 (amount 2100) is held for review and written
# as 25 (0 + the handling fee), where the base pipeline writes it unchanged.

channel:
  target: ../../pipeline/order_fulfillment.yaml

config:
  risk.threshold: 0.95

overrides:
  - op: patch_schema
    target: orders
    schema:
      amount: { scale: 2 }
