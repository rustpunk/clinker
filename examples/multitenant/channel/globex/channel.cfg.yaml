# Manifest for the `globex` tenant. The folder name (globex) is the channel id;
# this manifest adds identity labels and channel-wide overrides.
#
#   - `labels:` are identity, never a pipeline override. The `tier: enterprise`
#     label makes the `enterprise` group's selector match, so globex gets the
#     fraud_check injection automatically.
#   - `fixed:` locks a value channel-wide: unlike a plain `config:` clobber it
#     holds against every *higher* layer, so the per-target overlay's 0.95 is
#     ignored and 0.9 wins. `channels resolve` marks the winning value with
#     `(fixed)`.

channel:
  name: globex

labels: { tier: enterprise, region: west }

fixed:
  risk.threshold: 0.9
