name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

      # Bench infrastructure CI gate (compile + smoke)
      - run: cargo check --benches --workspace
      - run: cargo check --features bench-alloc -p clinker-benchmarks
      - run: cargo test --benches -p clinker-benchmarks

  cross-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          targets: x86_64-pc-windows-msvc, aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - run: cargo check --target x86_64-pc-windows-msvc -p clinker-core
      - run: cargo check --target aarch64-apple-darwin -p clinker-core

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
