name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Auto-update PR branches rebases open PRs with the default GITHUB_TOKEN, and
  # pushes made with that token never start a workflow run. Manual dispatch is
  # therefore the only way to re-validate a rebased branch without pushing to it.
  # Dispatched runs report against the selected branch rather than the PR's merge
  # ref, so they appear in the Actions tab instead of the PR's check list.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation only speeds iterative local rebuilds; in CI every
  # build is effectively from-scratch, so it just bloats target/ — a disk-
  # pressure source on the multi-build check job below.
  CARGO_INCREMENTAL: "0"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~25-30 GB of preinstalled SDKs the Rust build never touches.
      # This job compiles the whole workspace several times over (two clippy
      # passes, the test build, and three bench-compile steps) into one shared
      # target/, which can exhaust the hosted runner's root volume mid-link.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      # Two clippy passes. The first omits --all-targets on purpose: with
      # test targets excluded, a pub(crate) item referenced only from
      # #[cfg(test)] code still trips the dead-code lint, so the dead-code
      # gate keeps working. The second adds --all-targets to lint test,
      # bench, and example code that the first pass never compiles.
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      # Example pipelines double as runnable documentation and a smoke-test
      # surface, so every top-level pipeline under examples/pipelines/ must at
      # least compile through the plan-only `--explain` path. This catches
      # config-schema and CXL-grammar drift at the boundary instead of leaving a
      # reader to trip over a stale example. `cargo test` above already exercises
      # the same gate via crates/clinker/tests/examples_explain.rs; this step is
      # the fast, explicit signal and keeps the smoke command discoverable.
      - name: Smoke-check example pipelines (--explain)
        run: |
          cargo build --locked -p clinker
          bin="$PWD/target/debug/clinker"
          cd examples/pipelines
          rc=0
          for f in *.yaml; do
            if "$bin" run "$f" --explain >/dev/null; then
              echo "ok: $f"
            else
              echo "FAIL: $f did not pass --explain"
              rc=1
            fi
          done
          exit $rc

      # Bench infrastructure CI gate (compile + smoke)
      - run: cargo check --benches --workspace
      - run: cargo check --features bench-alloc -p clinker-benchmarks
      - run: cargo test --benches -p clinker-benchmarks

  # Execute the full suite on the other two first-class targets. These
  # runners have a native C toolchain, so the `ring` (TLS) build script in
  # clinker-net/clinker links cleanly here — which the ubuntu cross-check
  # job below cannot do without an MSVC/Apple cross-linker. This is where
  # the platform `#[cfg(windows)]` / `#[cfg(target_os = "macos")]` test
  # modules — including the de-gated RSS-validity assertions — actually run.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # Type-check the non-Linux targets from the ubuntu host. `--all-targets`
  # so test and bench targets compile too — a #[cfg(windows)] /
  # #[cfg(target_os = "macos")] branch that fails to build now fails CI
  # here, not only when a native runner reaches it. Scoped to the crates
  # that cross-compile without a C toolchain; clinker-net and clinker pull
  # in `ring`, whose build script needs a cross-linker the ubuntu host
  # lacks, so their non-Linux coverage comes from the native runners above.
  cross-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          targets: x86_64-pc-windows-msvc, aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - run: >-
          cargo check --all-targets --target x86_64-pc-windows-msvc
          -p clinker-exec -p clinker-plan -p clinker-schema
          -p clinker-channel -p cxl-cli -p clinker-lineage
      - run: >-
          cargo check --all-targets --target aarch64-apple-darwin
          -p clinker-exec -p clinker-plan -p clinker-schema
          -p clinker-channel -p cxl-cli -p clinker-lineage

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
