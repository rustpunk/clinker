# cargo-deny configuration for clinker
# Ensures zero C build dependencies in clinker crates (pure Rust only)
#
# Run: cargo deny check

[bans]
multiple-versions = "warn"
deny = [
    # Ban cmake — enforces pure Rust compilation
    # Note: cc is allowed via skip (Dioxus/GTK transitive build dep)
    { name = "cmake" },
]
# Allow pure Rust FFI crates and Dioxus build deps
skip = [
    { name = "libc" },
    { name = "linux-raw-sys" },
    { name = "mach2" },
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "cc" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[advisories]
yanked = "deny"
unmaintained = "all"
# Dioxus desktop transitive deps: GTK3 bindings, instant, proc-macro-error
# bincode 1.3.3: unmaintained advisory (not a vulnerability — team considers v1.3.3 complete)
# RUSTSEC-2026-0098/0099/0104: rustls-webpki advisories (name-constraints +
# CRL parsing panic) reaching us transitively through dioxus-devtools →
# tungstenite → rustls-webpki. Patched rustls-webpki not yet adopted by
# tungstenite 0.28; tracked upstream. Clinker does not perform certificate-name-
# constraint validation or CRL parsing directly. Phase 16d remediation plan
# documents these as tolerated transitive Dioxus advisories.
ignore = [
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0384",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]
