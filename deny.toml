# cargo-deny configuration for clinker
# Ensures zero C build dependencies in clinker crates (pure Rust only)
#
# Run: cargo deny check

[bans]
multiple-versions = "warn"
deny = [
    # Ban cmake — enforces pure Rust compilation
    { name = "cmake" },
]
skip = [
    # Cross-platform dependencies commonly pull multiple Windows support
    # crate versions into the lockfile.
    { name = "windows-sys" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
    # Mozilla's CA trust-anchor list (webpki-roots, pulled by ureq's
    # rustls TLS) ships under this permissive data-sharing license. It
    # covers the root-certificate *data*, not code, and imposes no
    # copyleft on the dependent crate.
    "CDLA-Permissive-2.0",
]

[advisories]
yanked = "deny"
unmaintained = "all"
