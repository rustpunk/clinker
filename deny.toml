# cargo-deny configuration for clinker
# Ensures zero C build dependencies in clinker crates (pure Rust only)
#
# Run: cargo deny check

[bans]
multiple-versions = "warn"
deny = [
    # Ban cmake — enforces pure Rust compilation
    { name = "cmake" },
]
# Tolerate duplicate versions of Dioxus desktop's Windows binding crates
# (multiple windows-sys / windows-targets versions are common in transitive
# graphs that pull in different Dioxus subcrates).
skip = [
    { name = "windows-sys" },
    { name = "windows-targets" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
]

[advisories]
yanked = "deny"
unmaintained = "all"
# Dioxus desktop transitive deps: GTK3 bindings, instant, proc-macro-error.
# RUSTSEC-2026-0104: rustls-webpki CRL-parsing-panic advisory reaching us
# transitively through dioxus-devtools → tungstenite → rustls-webpki. Patched
# rustls-webpki not yet adopted by tungstenite 0.28; tracked upstream. Clinker
# does not perform CRL parsing directly.
ignore = [
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0384",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2026-0104",
]
